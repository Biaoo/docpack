version: 1
layout: repo
lastReviewedAt: 2026-04-20
lastReviewedCommit: example-repo-config
catalog:
  repos:
    - id: sample-sdk
      path: .
      canonicalRepo: Biaoo/sample-sdk
      entryDoc: README.md
      branchPolicyDoc: docs/branch-policy.md
      workflowDocs:
        - docs/workflows/local-dev.md
      integrationDocs:
        - docs/workflows/workspace-integration.md
      workspaceIntegrationRequired: false
ownership:
  domains:
    - id: public-api
      paths:
        include:
          - src/api/**
          - src/commands/**
      ownerRepo: sample-sdk
coverage:
  include:
    - src/**
    - docs/**
  exclude:
    - dist/**
    - vendor/**
freshness:
  warn_after_commits: 50
  warn_after_days: 90
  critical_after_days: 180
routing:
  intents:
    api:
      paths:
        - src/api/**
        - src/commands/**
    governance:
      paths:
        - .docpact/**
        - docs/**
docInventory:
  include:
    - README.md
    - docs/**
    - .docpact/**/*.md
    - .docpact/**/*.yaml
  exclude:
    - docs/archive/**
repo:
  id: sample-sdk
  owner: sample-sdk
  runtime: node
rules:
  - id: api-surface
    scope: repo
    repo: sample-sdk
    triggers:
      - path: src/api/**
        kind: code
      - path: src/commands/**
        kind: code
    requiredDocs:
      - path: README.md
        mode: review_or_update
      - path: .docpact/config.yaml
        mode: review_or_update
      - path: docs/api.md
        mode: body_update_required
    reason: User-facing API and command changes must refresh the repo contract and public docs.
