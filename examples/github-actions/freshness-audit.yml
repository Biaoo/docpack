name: docpact-freshness-audit

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  docpact:
    runs-on: ubuntu-latest
    steps:
      - name: Check out target repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run docpact freshness audit
        uses: your-org/docpact@v1
        with:
          version: 0.1.0
          args: >
            freshness
            --root .
            --format json
